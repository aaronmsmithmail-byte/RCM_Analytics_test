name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.8.0

      - name: Check linting rules
        run: ruff check src/ tests/ app.py generate_sample_data.py

      - name: Check formatting
        run: ruff format --check src/ tests/ app.py generate_sample_data.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: python generate_sample_data.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Coverage summary
        if: always()
        run: |
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r src/ app.py -c bandit.toml --severity-level medium

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r requirements.txt
