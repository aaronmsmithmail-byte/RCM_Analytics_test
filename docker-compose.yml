services:
  # ── Cube — Semantic Layer ──────────────────────────────────
  # Provides REST API at http://localhost:4000 for metric queries
  # and semantic metadata. Connects to the shared DuckDB database.
  cube:
    image: cubejs/cube:latest
    ports:
      - "4000:4000"     # REST API + Playground
      - "15432:15432"   # Cube SQL API (Postgres-compatible)
    volumes:
      - ./cube:/cube/conf
      - ./data:/cube/data:ro
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_API_SECRET: "rcm_analytics_dev_secret"
      CUBEJS_EXTERNAL_DEFAULT: "true"
      CUBEJS_SCHEDULED_REFRESH_DEFAULT: "false"
      CUBEJS_DB_TYPE: "duckdb"
      CUBEJS_DB_DUCKDB_DATABASE_PATH: "/cube/data/rcm_analytics.db"
      CUBEJS_SCHEMA_PATH: "/cube/conf/model"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:4000/readyz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── Neo4j — Knowledge Graph ────────────────────────────────
  # Stores the entity-relationship model (10 nodes, 9 FK edges).
  # Browser at http://localhost:7474, Bolt at bolt://localhost:7687
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/rcm_analytics
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
      - ./neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p rcm_analytics 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Streamlit App ──────────────────────────────────────────
  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      cube:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      CUBE_API_URL: "http://cube:4000/cubejs-api/v1"
      CUBE_API_SECRET: "rcm_analytics_dev_secret"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "rcm_analytics"
    volumes:
      - ./data:/app/data

volumes:
  neo4j_data:
